name: release

# Build the compiled `acc` binary for every supported platform and attach the
# tarballs to the corresponding GitHub Release. Bun's `--compile` supports
# cross-architecture builds from a single host, so one Linux runner handles
# all four targets. We still split into one job per target to keep failures
# localized (a single cross-compile failure shouldn't fail the whole matrix).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.4.0). Creates the release if it doesn't exist."
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - darwin-arm64
          - darwin-x64
          - linux-x64
          - linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (for workspace install)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install workspace deps
        # `npm install` is faster than `npm ci` here because the repo doesn't
        # commit a lockfile yet. Swap to `npm ci` once package-lock.json lands.
        run: npm install --no-audit --no-fund

      - name: Build workspace TypeScript
        # The Bun build consumes pre-built .js (faster, and it's what ships).
        run: npm run build

      - name: Compile binary (${{ matrix.target }})
        run: bun run scripts/build-binary.ts ${{ matrix.target }}

      - name: Package tarball
        run: |
          cd dist/binaries
          mv "acc-${{ matrix.target }}" acc
          chmod +x acc
          tar -czf "acc-${{ matrix.target }}.tar.gz" acc
          rm acc
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: acc-${{ matrix.target }}
          path: dist/binaries/acc-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          merge-multiple: true

      - name: Compute checksums
        run: |
          cd dist/artifacts
          sha256sum acc-*.tar.gz | tee checksums.txt

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/artifacts/acc-*.tar.gz
            dist/artifacts/checksums.txt
